<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OpenAI 兼容聊天预览</title>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 0; background: #f9f9f9; height: 100vh; display: flex; flex-direction: column; }
    header { background: #fff; border-bottom: 1px solid #e6e6e6; padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; }
    h2 { margin: 0; font-size: 18px; }
    .container { flex: 1; display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; width: 100%; background: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
    
    .config-panel { padding: 12px 18px; border-bottom: 1px solid #eee; display: flex; gap: 10px; flex-wrap: wrap; background: #fafafa; }
    .config-panel div { display: flex; flex-direction: column; gap: 4px; }
    .config-panel label { font-size: 11px; color: #666; }
    .config-panel input { padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }

    #chat-history { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 16px; }
    .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 15px; line-height: 1.5; word-break: break-word; white-space: pre-wrap; }
    .msg.user { align-self: flex-end; background: #007bff; color: #fff; border-bottom-right-radius: 2px; }
    .msg.assistant { align-self: flex-start; background: #f1f1f1; color: #333; border-bottom-left-radius: 2px; border: 1px solid #e0e0e0; }
    
    .input-area { border-top: 1px solid #eee; padding: 12px 18px; display: flex; gap: 10px; background: #fff; }
    textarea { flex: 1; height: 60px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; resize: none; outline: none; }
    textarea:focus { border-color: #007bff; }
    button { padding: 0 20px; border-radius: 8px; border: none; background: #007bff; color: #fff; font-weight: bold; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    
    .status-bar { padding: 4px 18px; font-size: 12px; color: #888; border-top: 1px solid #f0f0f0; background: #fff; display: flex; justify-content: space-between; }
    .error { color: #d32f2f; margin-right: 10px; }
  </style>
</head>
<body>

<header>
  <h2>OpenAI 兼容聊天工具</h2>
  <button id="btnClear" style="background:#f44336; padding: 4px 10px; font-size:12px;">清空对话</button>
</header>

<div class="container">
  <div class="config-panel">
    <div style="flex: 2;">
      <label>API Base URL</label>
      <input id="apiBase" value="http://localhost:58045/v1" placeholder="https://api.openai.com/v1" />
    </div>
    <div style="flex: 2;">
      <label>API Key</label>
      <input id="apiKey" type="password" placeholder="sk-..." />
    </div>
    <div style="flex: 1;">
      <label>模型 (Model)</label>
      <select id="model" style="padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px;">
        <option value="gemini-3-flash">Gemini 3 Flash</option>
        <option value="gemini-3-pro-high">Gemini 3 Pro High</option>
        <option value="gemini-3-pro-low">Gemini 3 Pro Low</option>
        <option value="gemini-3-pro-image">Gemini 3 Pro (Image)</option>
        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
        <option value="gemini-2.5-flash-thinking">Gemini 2.5 Flash (Thinking)</option>
        <option value="claude-sonnet-4-5">Claude 4.5 Sonnet</option>
        <option value="claude-sonnet-4-5-thinking">Claude 4.5 Sonnet (Thinking)</option>
        <option value="claude-opus-4-5-thinking">Claude 4.5 Opus (Thinking)</option>
      </select>
    </div>
  </div>

  <div id="chat-history">
    <!-- 消息将显示在这里 -->
  </div>

  <div class="input-area">
    <textarea id="userInput" placeholder="输入消息，Shift+Enter 换行，Enter 发送..."></textarea>
    <button id="btnSend">发送</button>
    <button id="btnStop" style="background:#555; display:none;">停止</button>
  </div>
  
  <div class="status-bar">
    <div style="flex:1; display:flex; gap:10px;">
        <span id="status">就绪</span>
        <span id="err" class="error"></span>
    </div>
    <div style="font-size: 10px;">
        <input type="checkbox" id="debug"> 调试模式
    </div>
  </div>
  <pre id="log" style="display:none; background:#000; color:#0f0; padding:10px; font-size:11px; margin:0; max-height:150px; overflow:auto;"></pre>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const chatHistory = $("chat-history");
  const userInput = $("userInput");
  const btnSend = $("btnSend");
  const btnStop = $("btnStop");
  const logEl = $("log");
  
  let messages = [];
  let abortController = null;

  function log(msg) {
    if (!$("debug").checked) return;
    logEl.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
    logEl.scrollTop = logEl.scrollHeight;
  }

  $("debug").onchange = (e) => {
    logEl.style.display = e.target.checked ? "block" : "none";
  };

  function appendMessage(role, content) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.textContent = content;
    chatHistory.appendChild(div);
    chatHistory.scrollTop = chatHistory.scrollHeight;
    return div;
  }

  function setBusy(busy) {
    btnSend.disabled = busy;
    btnStop.style.display = busy ? "block" : "none";
    $("status").textContent = busy ? "正在思考..." : "就绪";
  }

  async function send() {
    const text = userInput.value.trim();
    if (!text || btnSend.disabled) return;

    const apiBase = $("apiBase").value.trim().replace(/\/+$/, "");
    const apiKey = $("apiKey").value.trim();
    const model = $("model").value.trim();

    if (!apiKey) {
      $("err").textContent = "请设置 API Key";
      return;
    }
    $("err").textContent = "";
    log(`发送请求: ${model} 到 ${apiBase}`);

    // 添加用户消息
    appendMessage("user", text);
    messages.push({ role: "user", content: text });
    userInput.value = "";

    // 准备助手回复容器
    const assistantMsgDiv = appendMessage("assistant", "");
    let assistantContent = "";

    abortController = new AbortController();
    setBusy(true);

    try {
      const body = {
        model: model,
        messages: messages,
        stream: true
      };

      // 特殊处理 Gemini 图像模型配置
      if (model.includes("image")) {
        body.generationConfig = {
          responseModalities: ["Image"]
        };
      }

      const response = await fetch(`${apiBase}/chat/completions`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`
        },
        body: JSON.stringify(body),
        signal: abortController.signal
      });

      if (!response.ok) {
        const errText = await response.text();
        log(`错误: HTTP ${response.status} - ${errText}`);
        throw new Error(`HTTP ${response.status}: ${errText.slice(0, 100)}`);
      }

      log("连接成功，等待流数据...");
      const reader = response.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let buffer = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) {
            log("数据读取完成");
            break;
        }

        buffer += decoder.decode(value, { stream: true });
        
        // 使用更可靠的 SSE 解析方式
        const chunks = buffer.split("\n");
        buffer = chunks.pop(); // 存储不完整的最后一行

        for (const line of chunks) {
          const trimmed = line.trim();
          if (!trimmed || !trimmed.startsWith("data:")) continue;
          
          const rawData = trimmed.slice(5).trim();
          if (rawData === "[DONE]") {
            log("收到 [DONE]");
            continue;
          }

          try {
            const json = JSON.parse(rawData);
            const delta = json.choices?.[0]?.delta;
            if (!delta) continue;

            // 处理文本或多媒体
            if (delta.content) {
              const content = delta.content;
              
              // 匹配 Base64 图片 (针对 Gemini 图像模型)
              const imgMatch = content.match(/data:image\/.*?;base64,[A-Za-z0-9+/=]+/);
              if (imgMatch) {
                if (!assistantMsgDiv.querySelector('img')) {
                    log("识别到图像数据");
                    const img = document.createElement("img");
                    img.style.maxWidth = "100%";
                    img.style.borderRadius = "8px";
                    img.style.marginTop = "8px";
                    img.src = imgMatch[0];
                    assistantMsgDiv.appendChild(img);
                }
              } else {
                assistantContent += content;
                assistantMsgDiv.textContent = assistantContent;
              }
            }
            
            // 处理思维链
            if (delta.reasoning_content) {
              if (!assistantMsgDiv.querySelector('.reasoning')) {
                const rDiv = document.createElement("div");
                rDiv.className = "reasoning";
                rDiv.style.fontSize = "0.85em";
                rDiv.style.color = "#888";
                rDiv.style.background = "#f8f8f8";
                rDiv.style.padding = "6px";
                rDiv.style.marginBottom = "8px";
                rDiv.style.borderRadius = "4px";
                rDiv.style.borderLeft = "3px solid #007bff";
                assistantMsgDiv.prepend(rDiv);
              }
              assistantMsgDiv.querySelector('.reasoning').textContent += delta.reasoning_content;
            }
            
            chatHistory.scrollTop = chatHistory.scrollHeight;
          } catch (e) {
            // 解析失败通常是因为数据切分不完整，忽略并等待下一块
          }
        }
      }
      
      messages.push({ role: "assistant", content: assistantContent });

    } catch (e) {
      if (e.name === "AbortError") {
        log("请求已取消");
        $("status").textContent = "已停止";
        messages.push({ role: "assistant", content: assistantContent });
      } else {
        log(`异常: ${e.message}`);
        $("err").textContent = e.message;
        assistantMsgDiv.textContent += "\n[请求失败: " + e.message + "]";
      }
    } finally {
      setBusy(false);
      abortController = null;
    }
  }

  btnSend.addEventListener("click", send);
  btnStop.addEventListener("click", () => abortController?.abort());
  
  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  $("btnClear").addEventListener("click", () => {
    messages = [];
    chatHistory.innerHTML = "";
    $("err").textContent = "";
    $("status").textContent = "就绪";
  });

</script>
</body>
</html>
